<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moderação | Daqui</title>
  <script>
    // Aplica o tema antes do primeiro paint (evita flash do tema errado).
    (function () {
      try {
        var stored = localStorage.getItem('daqui-moderator-theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --primary: #22C55E; --primary-dark: #16A34A; --primary-tint: #DCFCE7; --gold: #F59E0B;
      --bg: #F8FAFC; --surface: #FFFFFF; --border: #E2E8F0; --border-light: #F1F5F9;
      --text: #0F172A; --text-2: #64748B; --text-3: #94A3B8;
      --danger: #EF4444; --danger-bg: #FEF2F2;
      --pending-bg: #FEF3C7; --pending-text: #92400E; --reject-text: #B45309;
      --star-empty: #D1D5DB; --overlay: rgba(15,23,42,0.5);
      --shadow-login: rgba(0,0,0,0.06); --shadow-card: rgba(0,0,0,0.04);
    }
    :root[data-theme="dark"] {
      --primary-dark: #4ADE80; --primary-tint: rgba(34,197,94,0.18);
      --bg: #0B1220; --surface: #111A2E; --border: #243049; --border-light: #1A2336;
      --text: #F1F5F9; --text-2: #9FB0C3; --text-3: #6B7A90;
      --danger: #F87171; --danger-bg: rgba(239,68,68,0.14);
      --pending-bg: rgba(245,158,11,0.18); --pending-text: #FCD34D; --reject-text: #FBBF24;
      --star-empty: #3A4A63; --overlay: rgba(0,0,0,0.6);
      --shadow-login: rgba(0,0,0,0.45); --shadow-card: rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; }
    .hidden { display: none !important; }
    .theme-toggle {
      width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); font-size: 15px; display: flex; align-items: center; justify-content: center;
      padding: 0; flex-shrink: 0;
    }

    /* Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
    .login-theme-toggle { position: absolute; top: 20px; right: 20px; }
    .login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: 0 8px 30px var(--shadow-login); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .brand .dot { width: 34px; height: 34px; border-radius: 11px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; }
    .brand h1 { font-size: 22px; margin: 0; letter-spacing: -0.5px; }
    .muted { color: var(--text-3); font-size: 13px; }
    label { display:block; font-size: 13px; font-weight: 600; color: var(--text-2); margin: 16px 0 6px; }
    input, select { width: 100%; padding: 11px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text); }
    input:focus, select:focus { outline: none; border-color: var(--primary); }
    button { cursor: pointer; font-family: inherit; }
    .btn { width: 100%; margin-top: 18px; padding: 12px; font-size: 15px; font-weight: 700; color: #fff; background: var(--primary); border: none; border-radius: 12px; }
    .btn:disabled { opacity: .5; cursor: default; }
    .err { color: var(--danger); font-size: 13px; font-weight: 600; margin-top: 12px; min-height: 16px; }

    /* App shell: sidebar (seções) + conteúdo */
    .layout { display: flex; min-height: 100vh; align-items: stretch; }
    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 18px 12px;
    }
    .brand-mini { display: flex; align-items: center; gap: 9px; padding: 4px 10px 22px; font-weight: 800; font-size: 15px; }
    .brand-mini .dot { width: 28px; height: 28px; border-radius: 9px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size: 13px; }
    #nav { display: flex; flex-direction: column; gap: 3px; }
    .navbtn {
      display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
      padding: 10px 12px; border-radius: 10px; border: none; background: none;
      font-size: 14px; font-weight: 600; color: var(--text-2);
    }
    .navbtn .ic { font-size: 15px; width: 18px; text-align: center; }
    .navbtn.active { background: var(--primary-tint); color: var(--primary-dark); }
    .sidebar-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border-light); }
    .sidebar-footer .who { font-size: 12px; color: var(--text-3); margin-bottom: 8px; word-break: break-all; }
    .main { flex: 1; min-width: 0; }

    .topbar { position: sticky; top: 0; z-index: 10; background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; }
    .topbar h1 { font-size: 18px; margin: 0; }
    .linkbtn { background: none; border: none; color: var(--text-2); font-size: 13px; font-weight: 600; padding: 0; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 10px 14px; overflow-x: auto; }
      .brand-mini { padding: 0 14px 0 0; }
      #nav { flex-direction: row; gap: 6px; }
      .navbtn { width: auto; white-space: nowrap; }
      .sidebar-footer { margin-top: 0; margin-left: auto; padding-top: 0; border-top: none; display: flex; align-items: center; gap: 10px; }
      .sidebar-footer .who { margin-bottom: 0; }
    }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
    .stat { background: var(--surface); border: 1px solid var(--border-light); border-radius: 14px; padding: 14px 16px; }
    .stat .n { font-size: 24px; font-weight: 800; }
    .stat .l { font-size: 12px; color: var(--text-3); margin-top: 2px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab { padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; font-weight: 600; color: var(--text-2); }
    .tab.active { background: var(--primary-tint); border-color: var(--primary-tint); color: var(--primary-dark); }

    .card { background: var(--surface); border: 1px solid var(--border-light); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px var(--shadow-card); }
    .card .head { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 14px; object-fit: cover; background: var(--border); }
    .head .name { font-weight: 700; font-size: 15px; }
    .head .sub { font-size: 12px; color: var(--text-3); }
    .head .when { margin-left: auto; font-size: 12px; color: var(--text-3); white-space: nowrap; }
    .audit-sentence { font-weight: 400; font-size: 15px; color: var(--text); }
    .rating-row { display: flex; align-items: center; gap: 8px; margin: 12px 0 8px; }
    .stars { position: relative; display: inline-block; font-size: 20px; line-height: 1; letter-spacing: 2px; }
    .stars .base { color: var(--star-empty); }
    .stars .fill { color: var(--gold); position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; }
    .rating-num { font-weight: 800; font-size: 14px; }
    .comment { font-size: 14px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
    .comment.empty { color: var(--text-3); font-style: italic; }
    .badge { display: inline-block; font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: .4px; }
    .b-pending { background: var(--pending-bg); color: var(--pending-text); }
    .b-approved, .b-reviewed, .b-answered { background: var(--primary-tint); color: var(--primary-dark); }
    .b-rejected, .b-dismissed { background: var(--danger-bg); color: var(--danger); }
    .reason-tag { display: inline-block; font-size: 12px; font-weight: 700; color: var(--text-2); background: var(--border-light); padding: 3px 10px; border-radius: 999px; margin: 10px 0 6px; }
    .target-box { background: var(--bg); border: 1px solid var(--border-light); border-radius: 12px; padding: 12px; margin-top: 8px; }
    .target-box .label { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .target-box .content { font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
    .target-box.empty { color: var(--text-3); font-style: italic; font-size: 13px; }
    .reply-box { background: var(--primary-tint); border-radius: 12px; padding: 12px; margin-top: 10px; }
    .reply-box .label { font-size: 11px; font-weight: 700; color: var(--primary-dark); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .reply-box .content { font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
    textarea.reply-input { width: 100%; padding: 10px 12px; font-size: 13px; font-family: inherit; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text); resize: vertical; min-height: 64px; margin-top: 10px; }
    textarea.reply-input:focus { outline: none; border-color: var(--primary); }
    .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
    .act { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 700; }
    .act.approve { background: var(--primary); border-color: var(--primary); color: #fff; }
    .act.reject { background: var(--surface); border-color: var(--gold); color: var(--reject-text); }
    .act.del { margin-left: auto; background: none; border: none; color: var(--danger); }
    .empty-state { text-align: center; color: var(--text-3); padding: 60px 20px; }
    @media (max-width: 560px) { .stats { grid-template-columns: 1fr; } }

    /* Usuários */
    .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-row input { flex: 1; }
    .search-row button { width: auto; margin-top: 0; padding: 11px 20px; border-radius: 10px; }
    .user-result {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      border: 1px solid var(--border-light); border-radius: 12px; margin-bottom: 8px;
      background: var(--surface); cursor: pointer;
    }
    .user-result:hover { border-color: var(--primary); }
    .back-link { display: inline-block; margin-bottom: 14px; font-size: 13px; }
    .applink { color: var(--primary-dark); font-weight: 700; font-size: 13px; text-decoration: none; }
    .applink:hover { text-decoration: underline; }

    /* Modal (suspender conta) */
    .modal-overlay {
      position: fixed; inset: 0; background: var(--overlay); z-index: 50;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-card { width: 100%; max-width: 380px; }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="login" class="login-wrap">
    <button class="theme-toggle login-theme-toggle" id="themeToggleLogin" title="Alternar tema"></button>
    <div class="login-card">
      <div class="brand"><div class="dot">d</div><h1>Moderação Daqui</h1></div>
      <p class="muted">Acesso restrito a moderadores.</p>
      <label>Servidor da API</label>
      <input id="api" value="http://localhost:8000/api/v1" />
      <label>URL do app Daqui</label>
      <input id="appUrl" value="http://localhost:8081" />
      <label>E-mail</label>
      <input id="email" type="email" placeholder="moderador@daqui.com" autocomplete="username" />
      <label>Senha</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <button id="loginBtn" class="btn">Entrar</button>
      <div id="loginErr" class="err"></div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <div class="layout">
      <nav class="sidebar">
        <div class="brand-mini"><div class="dot">d</div><span>Moderação</span></div>
        <div id="nav"></div>
        <div class="sidebar-footer">
          <div class="who" id="who"></div>
          <button class="theme-toggle" id="themeToggleApp" title="Alternar tema"></button>
          <button class="linkbtn" id="logoutBtn">Sair</button>
        </div>
      </nav>

      <div class="main">
        <div class="topbar"><h1 id="sectionTitle"></h1></div>
        <div class="container">
          <div id="section-reviews">
            <div class="stats" id="stats"></div>
            <div class="tabs" id="tabs"></div>
            <div id="list"></div>
          </div>

          <div id="section-reports" class="hidden">
            <div class="stats" id="reportStats"></div>
            <div class="tabs" id="reportStatusTabs"></div>
            <div class="tabs" id="reportTypeTabs"></div>
            <div id="reportList"></div>
          </div>

          <div id="section-tickets" class="hidden">
            <div class="stats" id="ticketStats"></div>
            <div class="tabs" id="ticketStatusTabs"></div>
            <div id="ticketList"></div>
          </div>

          <div id="section-users" class="hidden">
            <div id="userSearchView">
              <div class="search-row">
                <input id="userSearchInput" placeholder="Buscar por nome ou @usuário..." />
                <button id="userSearchBtn" class="act approve">Buscar</button>
              </div>
              <div id="userSearchResults"></div>
            </div>

            <div id="userDetailView" class="hidden">
              <button class="linkbtn back-link" id="userBackBtn">← Voltar à busca</button>
              <div id="userDetailCard"></div>
              <div class="tabs" id="userContentTabs"></div>
              <div id="userContentList"></div>
            </div>
          </div>

          <div id="section-audit" class="hidden">
            <div class="search-row">
              <input id="auditModFilter" placeholder="Moderador (nome ou @usuário)" />
              <input id="auditUserFilter" placeholder="Usuário afetado (nome ou @usuário)" />
              <button id="auditSearchBtn" class="act approve">Buscar</button>
            </div>
            <div class="tabs" id="auditActionTabs"></div>
            <div id="auditList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: suspender conta -->
  <div id="suspendModal" class="modal-overlay hidden">
    <div class="card modal-card">
      <div class="head"><div class="name" id="suspendModalTitle">Suspender conta</div></div>
      <label>Duração</label>
      <select id="suspendDuration">
        <option value="1">1 dia</option>
        <option value="3">3 dias</option>
        <option value="7" selected>7 dias</option>
        <option value="30">30 dias</option>
        <option value="90">3 meses</option>
        <option value="180">6 meses</option>
        <option value="indef">Tempo indeterminado</option>
      </select>
      <label>Motivo (opcional)</label>
      <input id="suspendReason" placeholder="Motivo da suspensão" />
      <div class="actions">
        <button class="act" id="suspendCancelBtn">Cancelar</button>
        <button class="act approve" id="suspendConfirmBtn">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Modal: confirmação genérica (substitui window.confirm) -->
  <div id="confirmModal" class="modal-overlay hidden">
    <div class="card modal-card">
      <div class="head"><div class="name" id="confirmModalTitle">Confirmar ação</div></div>
      <div class="comment" id="confirmModalMessage" style="margin-top:8px;"></div>
      <div class="actions">
        <button class="act" id="confirmCancelBtn">Cancelar</button>
        <button class="act del" id="confirmOkBtn">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Modal: aviso/erro (substitui window.alert) -->
  <div id="messageModal" class="modal-overlay hidden">
    <div class="card modal-card">
      <div class="head"><div class="name" id="messageModalTitle">Aviso</div></div>
      <div class="comment" id="messageModalText" style="margin-top:8px;"></div>
      <div class="actions">
        <button class="act approve" id="messageOkBtn" style="margin-left:auto;">OK</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let API = '';
    let APP_URL = '';
    let token = '';

    // ── Tema (claro/escuro) ──
    // O atributo data-theme já foi definido por um script no <head> (evita
    // flash do tema errado); aqui só cuidamos do toggle e de persistir a escolha.
    const THEME_KEY = 'daqui-moderator-theme';
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);
      const icon = theme === 'dark' ? '☀️' : '🌙';
      document.querySelectorAll('.theme-toggle').forEach((btn) => { btn.textContent = icon; });
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
    $('themeToggleLogin').addEventListener('click', toggleTheme);
    $('themeToggleApp').addEventListener('click', toggleTheme);

    // ── Diálogos do app (substituem window.confirm/window.alert) ──
    let confirmResolve = null;
    function showConfirm(message, { title = 'Confirmar ação', confirmLabel = 'Confirmar', danger = true } = {}) {
      return new Promise((resolve) => {
        confirmResolve = resolve;
        $('confirmModalTitle').textContent = title;
        $('confirmModalMessage').textContent = message;
        $('confirmOkBtn').textContent = confirmLabel;
        $('confirmOkBtn').className = 'act ' + (danger ? 'del' : 'approve');
        $('confirmModal').classList.remove('hidden');
      });
    }
    function resolveConfirm(value) {
      $('confirmModal').classList.add('hidden');
      if (confirmResolve) { confirmResolve(value); confirmResolve = null; }
    }
    $('confirmCancelBtn').addEventListener('click', () => resolveConfirm(false));
    $('confirmOkBtn').addEventListener('click', () => resolveConfirm(true));

    function showMessage(message, title = 'Aviso') {
      $('messageModalTitle').textContent = title;
      $('messageModalText').textContent = message;
      $('messageModal').classList.remove('hidden');
    }
    $('messageOkBtn').addEventListener('click', () => $('messageModal').classList.add('hidden'));

    function postLink(postId) {
      return `${APP_URL}/post/${postId}`;
    }
    function userLink(userId) {
      return `${APP_URL}/user/${userId}`;
    }
    function appLinkTag(url, label) {
      return `<a class="applink" href="${url}" target="_blank" rel="noopener noreferrer">${label} →</a>`;
    }

    async function apiFetch(path, opts = {}) {
      const res = await fetch(API + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers || {}) },
      });
      if (res.status === 204) return null;
      const text = await res.text();
      const data = text ? JSON.parse(text) : null;
      if (!res.ok) throw new Error((data && data.detail) || ('Erro ' + res.status));
      return data;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
      catch { return iso; }
    }

    function truncate(s, n) {
      if (!s) return '';
      return s.length > n ? s.slice(0, n) + '…' : s;
    }

    // ── Login ──
    $('loginBtn').addEventListener('click', login);
    $('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

    async function login() {
      $('loginErr').textContent = '';
      $('loginBtn').disabled = true;
      API = $('api').value.trim().replace(/\/$/, '');
      APP_URL = $('appUrl').value.trim().replace(/\/$/, '');
      try {
        const r = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: $('email').value.trim(), password: $('password').value }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || 'Falha no login');
        if (!data.access_token) throw new Error('Esta conta exige 2FA (não suportado aqui).');
        token = data.access_token;
        // Confirma que é moderador buscando as estatísticas (403 se não for).
        await apiFetch('/admin/reviews/stats');
        $('who').textContent = $('email').value.trim();
        $('login').classList.add('hidden');
        $('app').classList.remove('hidden');
        renderNav();
        await goToSection(SECTIONS[0].key);
      } catch (e) {
        $('loginErr').textContent = e.message.includes('restrito') ? 'Esta conta não é moderadora.' : e.message;
      } finally {
        $('loginBtn').disabled = false;
      }
    }

    $('logoutBtn').addEventListener('click', () => {
      token = ''; $('app').classList.add('hidden'); $('login').classList.remove('hidden');
    });

    // ── Navegação por seções ──────────────────────────────────────────
    // Cada seção descreve seu título, o container que deve ficar visível e
    // como (re)carregar seus dados. Novas telas de moderação (ex.: outras
    // filas de denúncia) só precisam de uma nova entrada aqui.
    const SECTIONS = [
      { key: 'reviews', label: 'Avaliações', icon: '★', sectionId: 'section-reviews', title: 'Avaliações do Daqui', onShow: refreshReviews },
      { key: 'reports', label: 'Denúncias', icon: '⚑', sectionId: 'section-reports', title: 'Denúncias', onShow: refreshReports },
      { key: 'tickets', label: 'Chamados', icon: '✉', sectionId: 'section-tickets', title: 'Chamados de suporte', onShow: refreshTickets },
      { key: 'users', label: 'Usuários', icon: '◍', sectionId: 'section-users', title: 'Usuários', onShow: showUsers },
      { key: 'audit', label: 'Auditoria', icon: '🕘', sectionId: 'section-audit', title: 'Registro de Auditoria', onShow: refreshAuditLogs },
    ];
    let currentSection = SECTIONS[0].key;

    function renderNav() {
      const nav = $('nav');
      nav.innerHTML = '';
      for (const s of SECTIONS) {
        const b = document.createElement('button');
        b.className = 'navbtn' + (s.key === currentSection ? ' active' : '');
        b.innerHTML = `<span class="ic">${s.icon}</span><span>${s.label}</span>`;
        b.onclick = () => goToSection(s.key);
        nav.appendChild(b);
      }
    }

    async function goToSection(key) {
      currentSection = key;
      const section = SECTIONS.find((s) => s.key === key);
      renderNav();
      $('sectionTitle').textContent = section.title;
      for (const s of SECTIONS) $(s.sectionId).classList.toggle('hidden', s.key !== key);
      await section.onShow();
    }

    // ── Avaliações ─────────────────────────────────────────────────────
    // Avaliação é a opinião do usuário: a moderação não aprova/rejeita, só
    // pode excluir avaliações abusivas/spam (fica registrado na auditoria).
    $('tabs').remove(); // sem filtro por status — não há mais status

    function stars(rating) {
      const pct = (rating / 5) * 100;
      return `<span class="stars"><span class="base">★★★★★</span><span class="fill" style="width:${pct}%">★★★★★</span></span>`;
    }

    async function refreshReviews() {
      try {
        const [stats, list] = await Promise.all([
          apiFetch('/admin/reviews/stats'),
          apiFetch('/admin/reviews'),
        ]);
        renderReviewStats(stats);
        renderReviewList(list);
      } catch (e) {
        $('list').innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    function renderReviewStats(s) {
      $('stats').innerHTML = `
        <div class="stat"><div class="n">${s.total}</div><div class="l">avaliações</div></div>
        <div class="stat"><div class="n">${s.average != null ? s.average.toFixed(2).replace('.', ',') + ' ★' : '—'}</div><div class="l">nota média</div></div>`;
    }

    function renderReviewList(list) {
      if (!list.length) { $('list').innerHTML = `<div class="empty-state">Nenhuma avaliação ainda.</div>`; return; }
      $('list').innerHTML = '';
      for (const r of list) {
        const a = r.author;
        const card = document.createElement('div');
        card.className = 'card';
        const avatar = a.avatar_url || 'https://i.pravatar.cc/150?img=12';
        const comment = r.comment
          ? `<div class="comment">${escapeHtml(r.comment)}</div>`
          : `<div class="comment empty">— sem comentário —</div>`;
        card.innerHTML = `
          <div class="head">
            <img class="avatar" src="${avatar}" alt="" />
            <div>
              <div class="name">${escapeHtml(a.name)}</div>
              <div class="sub">@${escapeHtml(a.username)} · ${escapeHtml(a.neighborhood || '')}</div>
            </div>
            <div class="when">${fmtDate(r.updated_at)}</div>
          </div>
          <div class="rating-row">${stars(r.rating)}<span class="rating-num">${r.rating.toString().replace('.', ',')}</span></div>
          ${comment}
          <div class="actions">
            <button class="act del">Excluir</button>
          </div>`;
        card.querySelector('.del').onclick = () => delReview(r.id, a.name);
        $('list').appendChild(card);
      }
    }

    async function delReview(id, name) {
      const ok = await showConfirm(`Excluir a avaliação de ${name}? Esta ação não pode ser desfeita.`, {
        title: 'Excluir avaliação', confirmLabel: 'Excluir',
      });
      if (!ok) return;
      try { await apiFetch('/admin/reviews/' + id, { method: 'DELETE' }); await refreshReviews(); }
      catch (e) { showMessage(e.message, 'Erro'); }
    }

    // ── Denúncias ──────────────────────────────────────────────────────
    let reportStatusFilter = ''; // '', 'pending', 'reviewed', 'dismissed'
    let reportTypeFilter = '';   // '', 'post', 'comment', 'user'

    const REPORT_STATUS_FILTERS = [
      { key: '', label: 'Todas' },
      { key: 'pending', label: 'Pendentes' },
      { key: 'reviewed', label: 'Revisadas' },
      { key: 'dismissed', label: 'Descartadas' },
    ];
    const REPORT_TYPE_FILTERS = [
      { key: '', label: 'Todos os tipos' },
      { key: 'post', label: 'Publicações' },
      { key: 'comment', label: 'Comentários' },
      { key: 'user', label: 'Perfis' },
    ];
    const REPORT_STATUS_LABEL = { pending: 'Pendente', reviewed: 'Revisada', dismissed: 'Descartada' };
    const REPORT_TARGET_LABEL = { post: 'Publicação', comment: 'Comentário', user: 'Perfil' };
    const REPORT_REASON_LABEL = {
      ofensivo: 'Ofensivo e/ou propaga ódio',
      categoria_errada: 'Está na categoria errada',
      spam: 'É spam',
      nocivo: 'É nocivo para a comunidade',
      fake: 'É uma conta falsa/fake',
      nao_vizinho: 'Essa pessoa não é moradora desse bairro',
      nocivo_pessoa: 'Essa pessoa é nociva para a comunidade',
    };

    function renderReportTabs() {
      $('reportStatusTabs').innerHTML = '';
      for (const f of REPORT_STATUS_FILTERS) {
        const b = document.createElement('button');
        b.className = 'tab' + (f.key === reportStatusFilter ? ' active' : '');
        b.textContent = f.label;
        b.onclick = () => { reportStatusFilter = f.key; renderReportTabs(); refreshReports(); };
        $('reportStatusTabs').appendChild(b);
      }
      $('reportTypeTabs').innerHTML = '';
      for (const f of REPORT_TYPE_FILTERS) {
        const b = document.createElement('button');
        b.className = 'tab' + (f.key === reportTypeFilter ? ' active' : '');
        b.textContent = f.label;
        b.onclick = () => { reportTypeFilter = f.key; renderReportTabs(); refreshReports(); };
        $('reportTypeTabs').appendChild(b);
      }
    }

    async function refreshReports() {
      renderReportTabs();
      const params = new URLSearchParams();
      if (reportStatusFilter) params.set('status', reportStatusFilter);
      if (reportTypeFilter) params.set('target_type', reportTypeFilter);
      const qs = params.toString() ? '?' + params.toString() : '';
      try {
        const [stats, list] = await Promise.all([
          apiFetch('/admin/reports/stats'),
          apiFetch('/admin/reports' + qs),
        ]);
        renderReportStats(stats);
        renderReportList(list);
      } catch (e) {
        $('reportList').innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    function renderReportStats(s) {
      $('reportStats').innerHTML = `
        <div class="stat"><div class="n">${s.total}</div><div class="l">denúncias</div></div>
        <div class="stat"><div class="n">${s.pending}</div><div class="l">pendentes</div></div>`;
    }

    function reportTargetBox(r) {
      if (r.target_type === 'post') {
        if (!r.post) return `<div class="target-box empty">Publicação não encontrada (pode ter sido excluída).</div>`;
        const title = r.post.title ? escapeHtml(r.post.title) + ' — ' : '';
        return `<div class="target-box">
          <div class="label">Publicação de ${escapeHtml(r.post.author.name)}</div>
          <div class="content">${title}${escapeHtml(truncate(r.post.content, 280))}</div>
          <div style="margin-top:8px;">${appLinkTag(postLink(r.post.id), 'Ver publicação no app')}</div>
        </div>`;
      }
      if (r.target_type === 'comment') {
        if (!r.comment_target) return `<div class="target-box empty">Comentário não encontrado (pode ter sido excluído).</div>`;
        return `<div class="target-box">
          <div class="label">Comentário de ${escapeHtml(r.comment_target.author.name)}</div>
          <div class="content">${escapeHtml(truncate(r.comment_target.content, 280))}</div>
          <div style="margin-top:8px;">${appLinkTag(postLink(r.comment_target.post_id), 'Ver publicação do comentário')}</div>
        </div>`;
      }
      if (r.target_type === 'user') {
        if (!r.reported_user) return `<div class="target-box empty">Perfil não encontrado.</div>`;
        return `<div class="target-box">
          <div class="label">Perfil denunciado</div>
          <div class="content">${escapeHtml(r.reported_user.name)} · @${escapeHtml(r.reported_user.username)} · ${escapeHtml(r.reported_user.neighborhood || '')}</div>
          <div style="margin-top:8px;">${appLinkTag(userLink(r.reported_user.id), 'Ver perfil no app')}</div>
        </div>`;
      }
      return '';
    }

    function renderReportList(list) {
      if (!list.length) { $('reportList').innerHTML = `<div class="empty-state">Nenhuma denúncia encontrada.</div>`; return; }
      $('reportList').innerHTML = '';
      for (const r of list) {
        const rep = r.reporter;
        const card = document.createElement('div');
        card.className = 'card';
        const avatar = rep.avatar_url || 'https://i.pravatar.cc/150?img=12';
        const comment = r.comment
          ? `<div class="comment">${escapeHtml(r.comment)}</div>`
          : `<div class="comment empty">— sem comentário adicional —</div>`;
        card.innerHTML = `
          <div class="head">
            <img class="avatar" src="${avatar}" alt="" />
            <div>
              <div class="name">${escapeHtml(rep.name)} <span class="sub">denunciou</span></div>
              <div class="sub">@${escapeHtml(rep.username)} · ${REPORT_TARGET_LABEL[r.target_type] || r.target_type}</div>
            </div>
            <div class="when">${fmtDate(r.created_at)}</div>
          </div>
          <div>
            <span class="reason-tag">${escapeHtml(REPORT_REASON_LABEL[r.reason] || r.reason)}</span>
            <span class="badge b-${r.status}">${REPORT_STATUS_LABEL[r.status] || r.status}</span>
          </div>
          ${reportTargetBox(r)}
          ${comment}
          <div class="actions">
            <button class="act approve">Marcar como revisada</button>
            <button class="act reject">Descartar</button>
            <button class="act del">Excluir</button>
          </div>`;
        card.querySelector('.approve').onclick = () => setReportStatus(r.id, 'reviewed');
        card.querySelector('.reject').onclick = () => setReportStatus(r.id, 'dismissed');
        card.querySelector('.del').onclick = () => delReport(r.id);
        $('reportList').appendChild(card);
      }
    }

    async function setReportStatus(id, status) {
      try { await apiFetch('/admin/reports/' + id, { method: 'PATCH', body: JSON.stringify({ status }) }); await refreshReports(); }
      catch (e) { showMessage(e.message, 'Erro'); }
    }
    async function delReport(id) {
      const ok = await showConfirm('Excluir esta denúncia? Esta ação não pode ser desfeita.', {
        title: 'Excluir denúncia', confirmLabel: 'Excluir',
      });
      if (!ok) return;
      try { await apiFetch('/admin/reports/' + id, { method: 'DELETE' }); await refreshReports(); }
      catch (e) { showMessage(e.message, 'Erro'); }
    }

    // ── Chamados de suporte ──────────────────────────────────────────────
    // Chamado é aberto pelo usuário quando "Como usar"/FAQ não resolveram a
    // dúvida dele. A moderação responde por aqui; a resposta aparece para o
    // usuário em "Meus chamados" no app Daqui.
    let ticketStatusFilter = ''; // '', 'pending', 'answered'

    const TICKET_STATUS_FILTERS = [
      { key: '', label: 'Todos' },
      { key: 'pending', label: 'Pendentes' },
      { key: 'answered', label: 'Respondidos' },
    ];
    const TICKET_STATUS_LABEL = { pending: 'Pendente', answered: 'Respondido' };

    function renderTicketTabs() {
      $('ticketStatusTabs').innerHTML = '';
      for (const f of TICKET_STATUS_FILTERS) {
        const b = document.createElement('button');
        b.className = 'tab' + (f.key === ticketStatusFilter ? ' active' : '');
        b.textContent = f.label;
        b.onclick = () => { ticketStatusFilter = f.key; renderTicketTabs(); refreshTickets(); };
        $('ticketStatusTabs').appendChild(b);
      }
    }

    async function refreshTickets() {
      renderTicketTabs();
      const params = new URLSearchParams();
      if (ticketStatusFilter) params.set('status', ticketStatusFilter);
      const qs = params.toString() ? '?' + params.toString() : '';
      try {
        const [stats, list] = await Promise.all([
          apiFetch('/admin/support-tickets/stats'),
          apiFetch('/admin/support-tickets' + qs),
        ]);
        renderTicketStats(stats);
        renderTicketList(list);
      } catch (e) {
        $('ticketList').innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    function renderTicketStats(s) {
      $('ticketStats').innerHTML = `
        <div class="stat"><div class="n">${s.total}</div><div class="l">chamados</div></div>
        <div class="stat"><div class="n">${s.pending}</div><div class="l">pendentes</div></div>`;
    }

    function renderTicketList(list) {
      if (!list.length) { $('ticketList').innerHTML = `<div class="empty-state">Nenhum chamado encontrado.</div>`; return; }
      $('ticketList').innerHTML = '';
      for (const t of list) {
        const u = t.user;
        const card = document.createElement('div');
        card.className = 'card';
        const avatar = u.avatar_url || 'https://i.pravatar.cc/150?img=12';
        const answeredBox = t.status === 'answered'
          ? `<div class="reply-box"><div class="label">Resposta enviada em ${fmtDate(t.responded_at)}</div><div class="content">${escapeHtml(t.response)}</div></div>`
          : '';
        card.innerHTML = `
          <div class="head">
            <img class="avatar" src="${avatar}" alt="" />
            <div>
              <div class="name">${escapeHtml(u.name)}</div>
              <div class="sub">@${escapeHtml(u.username)} · ${escapeHtml(u.neighborhood || '')}</div>
            </div>
            <div class="when">${fmtDate(t.created_at)}</div>
          </div>
          <div>
            <span class="reason-tag">${escapeHtml(t.subject)}</span>
            <span class="badge b-${t.status}">${TICKET_STATUS_LABEL[t.status] || t.status}</span>
          </div>
          <div class="comment" style="margin-top:8px;">${escapeHtml(t.message)}</div>
          ${answeredBox}
          <textarea class="reply-input" placeholder="Escreva uma resposta para o usuário...">${escapeHtml(t.response || '')}</textarea>
          <div class="actions">
            <button class="act approve">${t.status === 'answered' ? 'Atualizar resposta' : 'Responder'}</button>
          </div>`;
        card.querySelector('.reply-input').value = t.response || '';
        card.querySelector('.approve').onclick = () => replyTicket(t.id, card.querySelector('.reply-input').value);
        $('ticketList').appendChild(card);
      }
    }

    async function replyTicket(id, response) {
      if (!response || !response.trim()) { showMessage('Escreva uma resposta antes de enviar.', 'Aviso'); return; }
      try {
        await apiFetch('/admin/support-tickets/' + id + '/reply', { method: 'PATCH', body: JSON.stringify({ response: response.trim() }) });
        await refreshTickets();
      } catch (e) { showMessage(e.message, 'Erro'); }
    }

    // ── Auditoria ──────────────────────────────────────────────────────
    // Registro de toda ação da moderação: exclusões, denúncias resolvidas/
    // descartadas e suspensões de conta. Pesquisável por moderador, usuário
    // afetado e tipo de ação.
    let auditModFilter = '';
    let auditUserFilter = '';
    let auditActionFilter = '';

    const AUDIT_ACTION_FILTERS = [
      { key: '', label: 'Todas' },
      { key: 'review_delete', label: 'Exclusão de avaliação' },
      { key: 'report_resolve', label: 'Denúncia resolvida' },
      { key: 'report_dismiss', label: 'Denúncia descartada' },
      { key: 'report_delete', label: 'Exclusão de denúncia' },
      { key: 'post_delete', label: 'Exclusão de post' },
      { key: 'comment_delete', label: 'Exclusão de comentário' },
      { key: 'user_suspend', label: 'Suspensão de conta' },
      { key: 'user_unsuspend', label: 'Reativação de conta' },
      { key: 'ticket_reply', label: 'Resposta de chamado' },
    ];
    const AUDIT_ACTION_LABEL = Object.fromEntries(
      AUDIT_ACTION_FILTERS.filter((f) => f.key).map((f) => [f.key, f.label]),
    );

    // Verbo usado na frase resumo de cada ação, com e sem usuário afetado
    // (algumas denúncias antigas podem não ter um usuário associado).
    const AUDIT_ACTION_VERB = {
      review_delete: 'excluiu a avaliação de',
      report_resolve: 'marcou como resolvida uma denúncia sobre',
      report_dismiss: 'descartou uma denúncia sobre',
      report_delete: 'excluiu uma denúncia sobre',
      post_delete: 'excluiu um post de',
      comment_delete: 'excluiu um comentário de',
      user_suspend: 'suspendeu a conta de',
      user_unsuspend: 'reativou a conta de',
      ticket_reply: 'respondeu um chamado de',
    };
    const AUDIT_ACTION_VERB_NO_TARGET = {
      review_delete: 'excluiu uma avaliação',
      report_resolve: 'marcou uma denúncia como resolvida',
      report_dismiss: 'descartou uma denúncia',
      report_delete: 'excluiu uma denúncia',
      post_delete: 'excluiu um post',
      comment_delete: 'excluiu um comentário',
      user_suspend: 'suspendeu uma conta',
      user_unsuspend: 'reativou uma conta',
      ticket_reply: 'respondeu um chamado',
    };

    // Retorna HTML (não texto puro): moderador e usuário afetado em negrito,
    // o resto da frase em peso normal.
    function auditSentence(l) {
      const mod = `<strong>${escapeHtml(l.moderator.username)}</strong>`;
      if (l.target_user) {
        const verb = AUDIT_ACTION_VERB[l.action] || AUDIT_ACTION_LABEL[l.action] || l.action;
        const target = `<strong>${escapeHtml(l.target_user.username)}</strong>`;
        return `${mod} ${escapeHtml(verb)} ${target}`;
      }
      const verb = AUDIT_ACTION_VERB_NO_TARGET[l.action] || AUDIT_ACTION_LABEL[l.action] || l.action;
      return `${mod} ${escapeHtml(verb)}`;
    }

    function renderAuditTabs() {
      $('auditActionTabs').innerHTML = '';
      for (const f of AUDIT_ACTION_FILTERS) {
        const b = document.createElement('button');
        b.className = 'tab' + (f.key === auditActionFilter ? ' active' : '');
        b.textContent = f.label;
        b.onclick = () => { auditActionFilter = f.key; renderAuditTabs(); refreshAuditLogs(); };
        $('auditActionTabs').appendChild(b);
      }
    }

    $('auditSearchBtn').addEventListener('click', () => {
      auditModFilter = $('auditModFilter').value.trim();
      auditUserFilter = $('auditUserFilter').value.trim();
      refreshAuditLogs();
    });
    $('auditModFilter').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('auditSearchBtn').click(); });
    $('auditUserFilter').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('auditSearchBtn').click(); });

    async function refreshAuditLogs() {
      renderAuditTabs();
      const params = new URLSearchParams();
      if (auditModFilter) params.set('moderator', auditModFilter);
      if (auditUserFilter) params.set('target_user', auditUserFilter);
      if (auditActionFilter) params.set('action', auditActionFilter);
      const qs = params.toString() ? '?' + params.toString() : '';
      try {
        const list = await apiFetch('/admin/audit-logs' + qs);
        renderAuditList(list);
      } catch (e) {
        $('auditList').innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    function renderAuditList(list) {
      if (!list.length) { $('auditList').innerHTML = `<div class="empty-state">Nenhum registro encontrado.</div>`; return; }
      $('auditList').innerHTML = '';
      for (const l of list) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="head">
            <div class="audit-sentence">${auditSentence(l)}</div>
            <div class="when">${fmtDate(l.created_at)}</div>
          </div>
          ${l.detail ? `<div class="comment" style="margin-top:8px;">${escapeHtml(l.detail)}</div>` : ''}
        `;
        $('auditList').appendChild(card);
      }
    }

    // ── Usuários ─────────────────────────────────────────────────────────
    // Busca um usuário, depois lista seus posts/comentários para exclusão
    // pontual pela moderação.
    const CATEGORY_LABEL = {
      geral: 'Geral', aviso: 'Aviso', seguranca: 'Segurança', evento: 'Evento',
      recomendacao: 'Recomendação', venda: 'Venda', pets: 'Pets', ajuda: 'Ajuda',
      perdidos: 'Perdidos', enquete: 'Enquete',
    };
    const USER_CONTENT_TABS = [
      { key: 'posts', label: 'Posts' },
      { key: 'comments', label: 'Comentários' },
    ];
    let selectedUser = null;
    let userContentTab = 'posts';
    let userPosts = [];
    let userComments = [];

    async function showUsers() {
      $('userSearchInput').focus();
    }

    $('userSearchBtn').addEventListener('click', searchUsers);
    $('userSearchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') searchUsers(); });
    $('userBackBtn').addEventListener('click', () => {
      $('userDetailView').classList.add('hidden');
      $('userSearchView').classList.remove('hidden');
    });

    async function searchUsers() {
      const q = $('userSearchInput').value.trim();
      if (!q) { $('userSearchResults').innerHTML = ''; return; }
      $('userSearchResults').innerHTML = `<div class="empty-state">Buscando…</div>`;
      try {
        const users = await apiFetch('/admin/users/search?q=' + encodeURIComponent(q));
        renderUserSearchResults(users);
      } catch (e) {
        $('userSearchResults').innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    // Rótulo sempre visível da suspensão (data de expiração, ou "indeterminado").
    function suspensionLabel(u) {
      if (!u.is_suspended) return null;
      return u.suspended_until
        ? `Suspenso até ${fmtDate(u.suspended_until)}`
        : 'Suspenso por tempo indeterminado';
    }

    function renderUserSearchResults(users) {
      if (!users.length) { $('userSearchResults').innerHTML = `<div class="empty-state">Nenhum usuário encontrado.</div>`; return; }
      $('userSearchResults').innerHTML = '';
      for (const u of users) {
        const avatar = u.avatar_url || 'https://i.pravatar.cc/150?img=12';
        const el = document.createElement('div');
        el.className = 'user-result';
        const suspBadge = u.is_suspended ? `<span class="badge b-rejected">Suspenso</span>` : '';
        const suspLine = u.is_suspended
          ? `<div class="sub">${escapeHtml(suspensionLabel(u))}</div>`
          : '';
        el.innerHTML = `
          <img class="avatar" src="${avatar}" alt="" />
          <div>
            <div class="name">${escapeHtml(u.name)} ${suspBadge}</div>
            <div class="sub">@${escapeHtml(u.username)} · ${escapeHtml(u.neighborhood || '')} · ${u.posts_count} posts</div>
            ${suspLine}
          </div>`;
        el.onclick = () => openUserDetail(u);
        $('userSearchResults').appendChild(el);
      }
    }

    async function openUserDetail(u) {
      selectedUser = u;
      userContentTab = 'posts';
      $('userSearchView').classList.add('hidden');
      $('userDetailView').classList.remove('hidden');
      renderUserDetailCard(u);
      await loadUserContent();
    }

    function renderUserDetailCard(u) {
      const avatar = u.avatar_url || 'https://i.pravatar.cc/150?img=12';
      const suspBadge = u.is_suspended ? `<span class="badge b-rejected">Suspenso</span>` : '';
      const suspLine = u.is_suspended
        ? `<div class="comment" style="margin-top:8px;">${escapeHtml(suspensionLabel(u))}</div>`
        : '';
      const reasonLine = u.is_suspended && u.suspension_reason
        ? `<div class="comment" style="margin-top:4px;">Motivo: ${escapeHtml(u.suspension_reason)}</div>`
        : '';
      const suspAction = u.is_suspended
        ? `<button class="act reject" id="unsuspendBtn">Reativar conta</button>`
        : `<button class="act reject" id="suspendBtn">Suspender conta</button>`;
      $('userDetailCard').innerHTML = `
        <div class="card">
          <div class="head">
            <img class="avatar" src="${avatar}" alt="" />
            <div>
              <div class="name">${escapeHtml(u.name)} ${suspBadge}</div>
              <div class="sub">@${escapeHtml(u.username)} · ${escapeHtml(u.neighborhood || '')}</div>
              <div class="sub">Membro desde ${fmtDate(u.created_at)}</div>
            </div>
            <div class="when">${u.posts_count} posts · ${u.interactions_count} interações</div>
          </div>
          ${suspLine}
          ${reasonLine}
          <div class="actions">${suspAction}</div>
        </div>`;
      if (u.is_suspended) {
        $('unsuspendBtn').onclick = () => unsuspendUser(u.id);
      } else {
        $('suspendBtn').onclick = () => openSuspendModal(u);
      }
    }

    let suspendTargetId = null;

    function openSuspendModal(user) {
      suspendTargetId = user.id;
      $('suspendModalTitle').textContent = `Suspender conta de ${user.name}`;
      $('suspendReason').value = '';
      $('suspendDuration').value = '7';
      $('suspendModal').classList.remove('hidden');
    }
    $('suspendCancelBtn').addEventListener('click', () => $('suspendModal').classList.add('hidden'));
    $('suspendConfirmBtn').addEventListener('click', async () => {
      const duration = $('suspendDuration').value;
      const reason = $('suspendReason').value.trim();
      const until = duration === 'indef'
        ? null
        : new Date(Date.now() + parseInt(duration, 10) * 24 * 60 * 60 * 1000).toISOString();
      try {
        const updated = await apiFetch(`/admin/users/${suspendTargetId}/suspend`, {
          method: 'POST',
          body: JSON.stringify({ until, reason }),
        });
        $('suspendModal').classList.add('hidden');
        selectedUser = { ...selectedUser, ...updated };
        renderUserDetailCard(selectedUser);
      } catch (e) { showMessage(e.message, 'Erro'); }
    });

    async function unsuspendUser(userId) {
      const ok = await showConfirm('Reativar esta conta?', {
        title: 'Reativar conta', confirmLabel: 'Reativar', danger: false,
      });
      if (!ok) return;
      try {
        const updated = await apiFetch(`/admin/users/${userId}/suspend`, { method: 'DELETE' });
        selectedUser = { ...selectedUser, ...updated };
        renderUserDetailCard(selectedUser);
      } catch (e) { showMessage(e.message, 'Erro'); }
    }

    function renderUserContentTabs() {
      $('userContentTabs').innerHTML = '';
      for (const t of USER_CONTENT_TABS) {
        const b = document.createElement('button');
        b.className = 'tab' + (t.key === userContentTab ? ' active' : '');
        b.textContent = t.label;
        b.onclick = () => { userContentTab = t.key; renderUserContentTabs(); renderUserContentList(); };
        $('userContentTabs').appendChild(b);
      }
    }

    async function loadUserContent() {
      renderUserContentTabs();
      $('userContentList').innerHTML = `<div class="empty-state">Carregando…</div>`;
      try {
        const [posts, comments] = await Promise.all([
          apiFetch(`/admin/users/${selectedUser.id}/posts`),
          apiFetch(`/admin/users/${selectedUser.id}/comments`),
        ]);
        userPosts = posts;
        userComments = comments;
        renderUserContentList();
      } catch (e) {
        $('userContentList').innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    function renderUserContentList() {
      const items = userContentTab === 'posts' ? userPosts : userComments;
      if (!items.length) {
        $('userContentList').innerHTML = `<div class="empty-state">Nenhum${userContentTab === 'posts' ? ' post' : ' comentário'} encontrado.</div>`;
        return;
      }
      $('userContentList').innerHTML = '';
      for (const item of items) {
        const card = document.createElement('div');
        card.className = 'card';
        if (userContentTab === 'posts') {
          const title = item.title ? escapeHtml(item.title) + ' — ' : '';
          card.innerHTML = `
            <div class="head">
              <div class="name">${CATEGORY_LABEL[item.category] || item.category}</div>
              <div class="when">${fmtDate(item.created_at)}</div>
            </div>
            <div class="comment">${title}${escapeHtml(truncate(item.content, 300))}</div>
            <div class="sub" style="margin-top:8px;">${item.likes_count} curtidas · ${item.comments_count} comentários</div>
            <div class="actions">
              ${appLinkTag(postLink(item.id), 'Ver no app')}
              <button class="act del">Excluir post</button>
            </div>`;
          card.querySelector('.del').onclick = () => deleteUserPost(item.id);
        } else {
          card.innerHTML = `
            <div class="head">
              <div class="name">Comentário</div>
              <div class="when">${fmtDate(item.created_at)}</div>
            </div>
            <div class="comment">${escapeHtml(item.content)}</div>
            <div class="actions">
              ${appLinkTag(postLink(item.post_id), 'Ver publicação no app')}
              <button class="act del">Excluir comentário</button>
            </div>`;
          card.querySelector('.del').onclick = () => deleteUserComment(item.id);
        }
        $('userContentList').appendChild(card);
      }
    }

    async function deleteUserPost(id) {
      const ok = await showConfirm('Excluir este post? Esta ação não pode ser desfeita.', {
        title: 'Excluir post', confirmLabel: 'Excluir',
      });
      if (!ok) return;
      try {
        await apiFetch('/admin/posts/' + id, { method: 'DELETE' });
        userPosts = userPosts.filter((p) => p.id !== id);
        renderUserContentList();
      } catch (e) { showMessage(e.message, 'Erro'); }
    }

    async function deleteUserComment(id) {
      const ok = await showConfirm('Excluir este comentário? Esta ação não pode ser desfeita.', {
        title: 'Excluir comentário', confirmLabel: 'Excluir',
      });
      if (!ok) return;
      try {
        await apiFetch('/admin/comments/' + id, { method: 'DELETE' });
        userComments = userComments.filter((c) => c.id !== id);
        renderUserContentList();
      } catch (e) { showMessage(e.message, 'Erro'); }
    }
  </script>
</body>
</html>
